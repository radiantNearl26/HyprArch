# WARNING: Create HYPRSHOT directory, if it doesn't exists.
env = HYPR_DIR,$HOME/.config/hypr/
env = HYPRSRC,$HOME/.config/hypr/hyprsource/
env = HYPRSHOT,$HOME/Pictures/Screenshots/


#  в”Џв”ів”“в”“в”Џв”Џв”“в”ів”ів”“в”Џв”“в”Џв”“
#   в”ѓ в”Јв”«в”Ј в”ѓв”ѓв”ѓв”Ј в”—в”“
#   в”» в”›в”—в”—в”›в”› в”—в”—в”›в”—в”›
# INFO: GTK Settings are saved in seperate file (settings.ini)
env = GTK_THEME,WhiteSur-Light-yellow:dark
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORMTHEME,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = ADW_DISABLE_PORTAL,1


#  в”Џв”“в”ів”ів”ів”“в”Џв”“в”Џв”“в”ів”“
#  в”ѓ в”ѓв”ѓв”Јв”«в”—в”“в”ѓв”ѓв”Јв”«
#  в”—в”›в”—в”›в”›в”—в”—в”›в”—в”›в”›в”—
# INFO: hyprctl setcursor is disabled. Use these var to change cursor themes.
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,20
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20


#  в”Џв”“в”“в”Џв”Џв”“в”Џв”ів”“в”Џв”“в”ів”ів”“
#  в”—в”“в”—в”«в”—в”“ в”ѓ в”Ј в”ѓв”ѓв”ѓ
#  в”—в”›в”—в”›в”—в”› в”» в”—в”›в”› в”—
# WARNING: Deleting any of these might cause issues!
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = PROTON_ENABLE_WAYLAND,1
env = ELECTRON_ARGS="--enable-features=UseOzonePlatform --ozone-platform=wayland"
