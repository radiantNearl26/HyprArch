# Rules for individual windows in Hyprland DE
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more




#  ┏┓┓ ┏┓┏┓┳┓┳┏┳┓┏┳┓┓┏
#  ┣┫┃ ┣┫┃ ┣┫┃ ┃  ┃ ┗┫
#  ┛┗┗┛┛┗┗┛┛┗┻ ┻  ┻ ┗┛
# Rules for erminal [WORKING]
windowrule {
    name = alacritty
    pseudo = on
    center = on
    size = 1138 715
    match:class = Alacritty
}


#  ┏┓┏┓┏┓┏┓┳┓┏┓
#  ┃┃┣┫┃┃┣ ┣┫┗┓
#  ┣┛┛┗┣┛┗┛┛┗┗┛
# Rules for papers [WORKING]
windowrule {
    name = papers
    float = on
    center = on
    size = 1342 734
    match:class = org.gnome.Papers
}


#  ┳┳┓ ┏┓┳┳┳┓┏┓┓┏┏┓┳┓
#  ┃┃┃ ┣┫┃┃┃┃┃ ┣┫┣ ┣┫
#  ┗┛┗┛┛┗┗┛┛┗┗┛┛┗┗┛┛┗
# Rules for ulauncher [WORKING]
windowrule {
    name = ulauncher
    float = on
    pin = on
    stay_focused = on
    match:class = ulauncher
}
# windowrule = move onscreen 23 383, match:class ulauncher


#  ┏┓┏┓┳┓┏┓
#   ┃┃ ┃┃┃┓
#  ┗┛┗┛┻┛┗┛
# Rules for xdg-desktop-portal-gtk [WORKING]
windowrule {
    name = xdg-desktop-portal-gtk
    float = on
    center = on
    size = 1120 650
    match:class = xdg-desktop-portal-gtk
}


#  ┏┓┳┳┓┳┓ ┏┓
#  ┗┓┃┃┃┃┃ ┣ 
#  ┗┛┛ ┗┻┗┛┗┛
# Rules for smile [WORKING]
windowrule {
    name = smile
    float = on
    move = onscreen 1205 403
    animation = slide right
    match:class = it.mijorus.smile
}


#  ┳┓┓ ┏┏┓
#  ┃┃┃┃┃┃┓
#  ┛┗┗┻┛┗┛
# Rules for nwg-clipman [WORKING]
windowrule {
    name = nwg-clipman
    float = on
    move = onscreen 716 147
    animation = slide right
    match:class = nwg-clipman
}


#  ┳┓┏┓┳┳┏┳┓┳┓ ┳┳┏┓
#  ┃┃┣┫┃┃ ┃ ┃┃ ┃┃┗┓
#  ┛┗┛┗┗┛ ┻ ┻┗┛┗┛┗┛
# Rules for Nautilus [WORKING]
windowrule {
    name = nautilus
    pseudo = on
    center = on
    size = 1120 650
    match:class = org.gnome.Nautilus
}

# Rules for Nautilus.Properties [WORKING]
windowrule {
    name = properties
    float = on
    center = on
    size = 450 616
    match:title = Properties
}

# Rules for file-roller [WORKING]
windowrule {
    name = file-roller
    float = on
    center = on
    size = 1120 650
    match:class = file-roller
}

# Rules for Nautilus.Open-File [WORKING]
windowrule {
    name = open file
    float = on
    center = on
    size = 1120 650
    match:title = Open File
}

# Rules for Nautilus.Save-File [WORKING]
windowrule {
    name = enter name of file to save to…
    float = on
    center = on
    size = 1120 650
    match:title = Enter name of file to save to…
}

# Rules for Nautilus.Upload-File [WORKING]
windowrule {
    name = file upload
    float = on
    center = on
    size = 1120 650
    match:title = File Upload
}


#  ┳┓┏┓┏┓┳
#  ┣┫┃┃┣ ┃
#  ┛┗┗┛┻ ┻
# Rules for rofi scripts [WORKING]
windowrule {
    name = rofi
    float = on
    center = on
    match:class = Rofi
}


#  ┓ ┏┏┓┓┏┏┓┏┓┏┓┏┓┳┓
#  ┃┃┃┣┫┗┫┃┃┣┫┃┃┣ ┣┫
#  ┗┻┛┛┗┗┛┣┛┛┗┣┛┗┛┛┗
# Rules for Waypaper [WORKING]
windowrule {
    name = waypaper
    float = on
    move = 1079 419
    size = 820 600
    animation = slide right
    match:class = waypaper
}


#  ┓ ┏┳┳┓┳┓┏┓┏┓┳┓┳┳┓┏┓
#  ┃┃┃┃┃┃┃┃┗┓┃ ┣┫┃┣┫┣ 
#  ┗┻┛┻┛┗┻┛┗┛┗┛┛┗┻┻┛┗┛
# Rules for Windscribe [WORKING]
windowrule {
    name = windscribe
    float = on
    center = on
    match:class = Windscribe
}


#  ┓ ┏┓┓┏┏┓┳┓┏┓
#  ┃ ┣┫┗┫┣ ┣┫┗┓
#  ┗┛┛┗┗┛┗┛┛┗┗┛
# Rules for various layers under same category

layerrule {
    name = hypr-dock
    blur = on
    ignore_alpha = 0.5
    animation = slide bottom
    match:namespace = hypr-dock
}

layerrule {
    name = hypr-dock (popup)
    blur = off
    ignore_alpha = 0
    animation = fade
    match:namespace = dock-popup
}

layerrule {
    name = waybar
    blur = on
    animation = slide
    blur_popups = on
    match:namespace = waybar
}

layerrule {
    name = awww-daemon
    animation = popin
    match:namespace = awww-daemon
    match:namespace = wallpaper
}

layerrule {
    name = swaync-control-center
    blur = on
    ignore_alpha = .3
    animation = slide right
    match:namespace = swaync-control-center
}

layerrule {
    name = swaync-notification-window
    blur = on
    ignore_alpha = .3
    animation = slide right
    match:namespace = swaync-notification-window
}

layerrule {
    name = gtk-layer-shell
    animation = fade
    match:namespace = gtk-layer-shell
}

layerrule {
    name = swayosd
    blur = on
    ignore_alpha = 0.5
    match:namespace = swayosd
}

layerrule {
    name = tofi-drun
    blur = on
    animation = slide bottom
    match:namespace = tofi-drun
}

layerrule {
    name = nwg-drawer
    blur = on
    animation = slide bottom
    match:namespace = nwg-drawer
}

layerrule {
    name = hyprpicker
    no_anim = on
    match:namespace = hyprpicker
}

layerrule {
    name = selection
    no_anim = on
    match:namespace = selection
}
