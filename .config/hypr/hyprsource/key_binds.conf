#  ┳┳┓┏┓┳┓┏┓
#  ┃┃┃┃┃┃┃┗┓
#  ┛ ┗┗┛┻┛┗┛
$mainMod = SUPER
# INFO: Use SUPERSHIFT for SUPER + SHIFT

# WORKAROUND: zsh aliases are not working, so had to use modifier as an alias for notify-send. Will fix it later.
# Notification icons set according to WhiteSur icon theme, so make sure to have it installed to avoid broken icons in notifications.
$notifexec=notify-send -i "app" 'Fist my bump!' 
$notifexecterm=notify-send -i "alacritty" 'Fist my bump!' 
$notifexecfiles=notify-send -i "nautilus" 'Fist my bump!' 
$notifexeccode=notify-send -i "vscode" 'Fist my bump!' 
$notifexecsmile=notify-send -i "ksmiletris" 'Fist my bump!' 
$notifexecwall=notify-send -i "wallpaper" 'Fist my bump!' 
$notifexecdock=notify-send -i "dock" 'Fist my bump!' 
$notifexeclock=notify-send -i "lock" 'Fist my bump!' 
$notifexecdisplay=notify-send -i "display" 'Fist my bump!' 
$notifexecmedia=notify-send -i "multimedia-video-player" 'Fist my bump!' 
$notifexecclip=notify-send -i "xclipboard" 'Fist my bump!' 
$notifexeclaunch=notify-send -i "ulauncher" 'Fist my bump!' 

#  ┏┓┏┓┏┓┏┓
#  ┣┫┃┃┃┃┗┓
#  ┛┗┣┛┣┛┗┛
# Execute your favourite apps using mainMod + [key]
bind = $mainMod, Q, exec, $notifexecterm 'Launching Alacritty'; alacritty
bind = $mainMod, A, exec, $notifexecfiles 'Launching Files'; nautilus
bind = $mainMod, Z, exec, $notifexeccode 'Launching VSCode'; code
# bind = $mainMod Shift, Z, exec, perplexity
bind = $mainMod Alt, W, exec, $notifexecdock 'Restarting Waybar'; pkill -SIGUSR2 waybar
bind = $mainMod, T, exec, $notifexec 'Enabled reading mode'; wlsunset -t 5400 -T 5500
bind = $mainMod Alt, T, exec, $notifexec 'Disabled reading mode'; pkill wlsunset
# bind = $mainMod, N, exec, ~/.local/share/applications/nvim.desktop
bind = $mainMod, period, exec, $notifexecsmile 'Launching Emojis'; it.mijorus.smile
bind = $mainMod, W, exec, $notifexecwall 'Bringing up waypaper'; waypaper
bind = $mainMod Shift, W, exec, $notifexecwall 'Restoring Waypaper'; waypaper --restore


#  ┏┓┏┓┏┓┓ ┏┓┏┓┏┳┓┳┏┓
#  ┃ ┣┫┣ ┃ ┣ ┗┓ ┃ ┃┣┫
#  ┗┛┛┗┗┛┗┛┗┛┗┛ ┻ ┻┛┗
#                    
# bind = $mainMod, N, exec, caelestia shell -d
# bind = $mainMod Shift, N, global,caelestia:launcher
# bind = $mainMod Shift, M, global, caelestia:session 

#  ┏┓┏┓┓ ┏┏┓┳┓
#  ┃┃┃┃┃┃┃┣ ┣┫
#  ┣┛┗┛┗┻┛┗┛┛┗
# Kill apps and system using mainMod + [key]
bind = $mainMod, K, killactive
bind = $mainMod SHIFT, M, exec, systemctl poweroff
bind = $mainMod, M, exec, hyprshutdown
bind = $mainMod, L, exec, $notifexeclock 'Initiating Lock'; loginctl lock-session
bind = $mainMod, D, exec, $notifexecdisplay 'Toggling primary display'; zsh ~/.scripts/disable-eDP.sh


#  ┏┳┓┳┓ ┓ ┳┳┓┏┓
#   ┃ ┃┃ ┃ ┃┃┃┃┓
#   ┻ ┻┗┛┗┛┻┛┗┗┛
# Toggle between normal & extra-ordinary!
bind = $mainMod SHIFT, P, togglefloating
bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, F, fullscreen, 2
bind = $mainMod SHIFT, F, fullscreen, 1


#  ┏┓┏┓┏┓┳┳┏┓
#  ┣ ┃┃┃ ┃┃┗┓
#  ┻ ┗┛┗┛┗┛┗┛
# Change focus with mainMod + [wasd]
bind = $mainMod, up, movefocus, w
bind = $mainMod, left, movefocus, a
bind = $mainMod, down, movefocus, s
bind = $mainMod, right, movefocus, d

#  ┓ ┏┏┓┳┓┓┏┓┏┓┏┓┏┓┏┓┏┓┏┓
#  ┃┃┃┃┃┣┫┃┫ ┗┓┃┃┣┫┃ ┣ ┗┓
#  ┗┻┛┗┛┛┗┛┗┛┗┛┣┛┛┗┗┛┗┛┗┛
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# Toggle workspace overviw mode (Hyprspace)
# bind = $mainMod, Tab, overview:toggle
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


#  ┓ ┏┳ ┳┓┳┓┏┓┏┓┏┓╹┳┓┏┳┓
#  ┃┃┃┃ ┃┃┃┃┃┃┣ ┗┓ ┃┃ ┃ 
#  ┗┻┛┻ ┛┗┻┛┗┛┗┛┗┛ ┛┗ ┻ 
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Move/resize windows with mainMod + Ctrl/Alt and dragging (useful for touchpad users)
bindm = $mainMod, Control_L, movewindow
bindm = $mainMod, ALT_L, resizewindow
# Switch focus to windows using keyboard (HyprEasyMotion)
# bind = , code:135, easymotion, action:hyprctl dispatch focuswindow address:{}
# Cycle through active windows using snappy-switcher
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev


#  ┳┳┓      •┏•    •    
#  ┃┃┃┏┓┏┓┏┓┓╋┓┏┏┓╋┓┏┓┏┓
#  ┛ ┗┗┻┗┫┛┗┗┛┗┗┗┻┗┗┗┛┛┗
#        ┛              
# Magnify the screen using keyboard buttons
bind = $mainMod SHIFT, right, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 + 0.1}')    
bind = $mainMod SHIFT, left, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 - 0.1}')    


#  ┏┓ ┏┓ ┳┓┳┳┓┳┓  ┓┏┓┏┓┓┏┏┓
#   ┃━┃  ┣┫┃┃┃┃┃━━┃┫ ┣ ┗┫┗┓
#  ┗┛ ┗┛ ┻┛┻┛┗┻┛  ┛┗┛┗┛┗┛┗┛
# Media Controls using XF86-keys
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume 2
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -2
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
# NOTE: The next 3 commands requires playerctl.
bindl = , XF86AudioPlay, exec, $notifexecmedia 'Toggling play/pause media'; playerctl play-pause
bindl = , XF86AudioPrev, exec, $notifexecmedia 'Toggling previous media'; playerctl previous
bindl = , XF86AudioNext, exec, $notifexecmedia 'Toggling next media'; playerctl next
bindl = , XF86AudioStop, exec, $notifexecmedia 'Toggling stop media'; playerctl stop
# Brightness Controls using XF86-keys
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness +2
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness -2


#  ┳┳┓       ┓
#  ┃┃┃┏┓┓┏┏┓┏┣┓┏┓┏┓
#  ┗┛┗┗┻┗┻┛┗┗┛┗┗ ┛
# Start your favourite app-launcher using mainMod
bind = $mainMod, U, exec, $notifexeclaunch 'Bringing up ulauncher'; ulauncher --no-window-shadow
bind = $mainMod, SUPER_L, exec, ulauncher-toggle
bind = , code:135, exec, fuzzel



#  ┏┓┏┓┳┓┏┓┏┓┳┓ ┏┓┓┏┏┓┏┓┏┳┓┏┓┳┓
#  ┗┓┃ ┣┫┣ ┣ ┃┃ ┗┓┣┫┃┃┃┃ ┃ ┣ ┣┫
#  ┗┛┗┛┛┗┗┛┗┛┛┗ ┗┛┛┗┗┛┗┛ ┻ ┗┛┛┗
# Screenshot your windows using mainMod + Prnt-Screen
bind = , PRINT, exec, hyprshot -m output -z
# bind = $mainMod, PRINT, exec, hyprshot -m output


#  ┏┓┓ ┳┏┓┳┓┏┓┏┓┳┓┳┓
#  ┃ ┃ ┃┃┃┣┫┃┃┣┫┣┫┃┃
#  ┗┛┗┛┻┣┛┻┛┗┛┛┗┛┗┻┛
# WARNING: Need to configure later!
bind = $mainMod, V, exec, $notifexecclip 'Bringing up clipboard'; nwg-clipman
# bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy


#  ┏┓┓┏┏┓┳┓┏┓┳┓┏┓
#  ┗┓┣┫┣┫┃┃┣ ┣┫┗┓
#  ┗┛┛┗┛┗┻┛┗┛┛┗┗┛
# Shader toggle keybindings
bind = $mainMod SHIFT, F1, exec, $notifexec 'Enabled 'amoled' shader'; hyprshade on amoled
bind = $mainMod SHIFT, F2, exec, $notifexec 'Enabled 'retro' shader'; hyprshade on retro
bind = $mainMod SHIFT, F3, exec, $notifexec 'Enabled 'cyberpunk' shader'; hyprshade on cyberpunk
bind = $mainMod SHIFT, F4, exec, $notifexec 'Enabled 'matrix' shader'; hyprshade on matrix
bind = $mainMod SHIFT, F5, exec, $notifexec 'Enabled 'reading-mode-filter' shader'; hyprshade on blue-light-filter
bind = $mainMod SHIFT, F11, exec, $notifexec 'Enabled 'vibrance' shader'; hyprshade on vibrance
# Turn off any active shader
bind = $mainMod SHIFT, F12, exec, $notifexec 'Disabled hyprshade'; hyprshade off
