[general]
import = ["/home/Asmit/.cache/wal/colors-alacritty.toml"]
# import = ["/home/Asmit/.config/alacritty/themes/aura-dark.toml"]
# import = ["/home/Asmit/.config/alacritty/themes/catppuccin-latte.toml"]

[cursor]
smooth_motion = true
smooth_motion_factor = 0.4
smooth_motion_spring = 0.5
smooth_motion_max_stretch_x = 3.0
smooth_motion_max_stretch_y = 3.0
# block_replace_shape = "underline"

[cursor.style]
shape = "Block"
blinking = "on"

[env]
TERM = "xterm-256color"

[mouse]
hide_when_typing = true

[font]
size = 12

[font.normal]
family = "CaskaydiaCove Nerd Font Mono"
style = "Regular"

[font.italic]
family = "ComicShannsMono Nerd Font"
style = "Italic"

[font.bold]
family = "ComicShannsMono Nerd Font Propo"
style = "Bold"

[font.bold_italic]
family = "ComicShannsMono Nerd Font"
style = "Bold Italic"

[font.glyph_offset]
x = 0
y = 0

[font.offset]
x = 0
y = 0

[scrolling]
history = 1000
multiplier = 3

[window]
blur = true
dynamic_padding = true
decorations = "None"
opacity = 0.9
startup_mode = "Windowed"
dynamic_title = true

[window.padding]
x = 35
y = 25

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

# [terminal.shell]
# program = "/bin/zsh"
# args = ["--login", "-c", "salut"]
